# XcodeGen source of truth for Wattly.xcodeproj (decision L16).
# Regenerate with:  xcodegen generate
name: Wattly
options:
  bundleIdPrefix: dev.jjundev
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"            # Swift 6 language mode (strict concurrency complete)
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SDKROOT: macosx
    ARCHS: arm64                    # Apple Silicon only (issue 17); avoids default universal build
    CODE_SIGN_IDENTITY: "-"         # ad-hoc — free Apple ID, no Developer ID / notarization (issue 17, N1)
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: NO     # not needed without notarization (free-account path, issue 17)
    ENABLE_USER_SCRIPT_SANDBOXING: YES
  configs:
    Debug:
      ENABLE_TESTABILITY: YES        # required for @testable import Wattly
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      DEBUG_INFORMATION_FORMAT: dwarf
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  Wattly:
    type: application
    platform: macOS
    sources:
      - path: Wattly
      - path: FanControlShared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES        # agent app: no Dock icon
        INFOPLIST_KEY_CFBundleDisplayName: Wattly
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHumanReadableCopyright: "Created by jjundev"
        PRODUCT_BUNDLE_IDENTIFIER: dev.jjundev.Wattly
        PRODUCT_NAME: Wattly
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES

  WattlyFanDaemon:
    type: tool
    platform: macOS
    sources:
      - path: WattlyFanDaemon
      - path: FanControlShared
      - path: Wattly/Core/SMC.swift
      - path: Wattly/Core/BatteryPower.swift
      - path: Wattly/Core/Temperature.swift
      - path: Wattly/Core/HardwareModel.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.jjundev.WattlyFanDaemon
        PRODUCT_NAME: WattlyFanDaemon

  WattlyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WattlyTests
    dependencies:
      - target: Wattly
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.jjundev.WattlyTests
        PRODUCT_NAME: WattlyTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Wattly.app/Contents/MacOS/Wattly"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Wattly:
    build:
      targets:
        Wattly: all
        WattlyFanDaemon: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - WattlyTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
